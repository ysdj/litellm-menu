providers:
  default: &default
    api_base: &default_api_base https://api.example.test/v1
    api_keys:
      - name: default
        value: &default_api_key "replace-me"

model_list:
  - model_name: default-chat
    litellm_params:
      model: openai/chat-model
      api_base: *default_api_base
      api_key: *default_api_key
      order: 1
    model_info:
      id: a1b2c3d4
      provider: default
      route_key: model=default-chat / provider=default / upstream=openai/chat-model / host=api.example.test / key=default / order=1
      api_key_name: default
      upstream_url_surface: openai/responses
      supported_upstream_url_surfaces: [openai/responses]
      supports_responses_image_generation_tool: false

litellm_settings:
  drop_params: true
  callbacks:
    - litellm_menu.callbacks.image_generation_routing_hook
  public_model_groups:
    - default-chat

general_settings:
  master_key: sk-local-litellm
  ui: true

router_settings:
  routing_strategy: simple-shuffle
  enable_weighted_failover: true
  num_retries: 2
  retry_after: 2
  retry_policy:
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 8
    InternalServerErrorRetries: 2
  max_fallbacks: 8
  disable_cooldowns: true
  cooldown_time: 45
